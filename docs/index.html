<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI for EDA ▸ Python 學習儀表板</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div>
          <div class="header-badge">AI for EDA Automation · 兩年衝刺計畫</div>
          <h1 class="site-title">Python 學習儀表板</h1>
          <p class="site-subtitle">從全端工程師邁向 IC 設計流程自動化工程師的學習歷程</p>
        </div>
        <a class="github-btn"
           href="https://github.com/tamytammy/learn_python"
           target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57
              0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695
              -.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99
              .105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225
              -.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405
              c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225
              0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3
              0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub
        </a>
      </div>

      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-value" id="stat-weeks">–</span>
          <span class="stat-label">週完成</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-exercises">–</span>
          <span class="stat-label">練習完成</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-commits">–</span>
          <span class="stat-label">提交次數</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-days">–</span>
          <span class="stat-label">學習天數</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- ── 週進度 ── -->
    <section class="section">
      <h2 class="section-title">
        <span class="section-icon">▸</span> 四週學習進度
      </h2>
      <div class="weeks-grid" id="weeks-grid">
        <div class="loading">載入中…</div>
      </div>
    </section>

    <!-- ── 技能樹 ── -->
    <section class="section">
      <h2 class="section-title">
        <span class="section-icon">▸</span> 技能樹
      </h2>
      <div class="skills-wrapper" id="skills-wrapper"></div>
    </section>

    <!-- ── 提交時間軸 ── -->
    <section class="section">
      <h2 class="section-title">
        <span class="section-icon">▸</span> 提交時間軸
      </h2>
      <div class="timeline" id="timeline"></div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container">
      <span>tamytammy ·
        <a href="https://github.com/tamytammy/learn_python"
           target="_blank" rel="noopener">learn_python</a>
      </span>
      <span id="last-updated">更新於 –</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
